<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Padel Analytics{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0e17;
            --bg2: #111827;
            --bg3: #1a2236;
            --accent: #06d6a0;
            --accent2: #118ab2;
            --warn: #ef476f;
            --gold: #ffd166;
            --text: #e8ecf1;
            --text2: #8892a4;
            --border: #1e293b;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        /* ─── NAV ─── */
        nav {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            height: 64px;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(12px);
        }
        .nav-brand {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--accent);
            text-decoration: none;
            margin-right: 3rem;
            letter-spacing: -0.5px;
        }
        .nav-brand span { color: var(--text2); font-weight: 400; }
        .nav-links { display: flex; gap: 0.25rem; }
        .nav-links a {
            color: var(--text2);
            text-decoration: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            font-size: 0.875rem;
            font-weight: 500;
            transition: all 0.2s;
        }
        .nav-links a:hover, .nav-links a.active {
            color: var(--text);
            background: var(--bg3);
        }
        .nav-links a.active { color: var(--accent); }

        /* ─── LAYOUT ─── */
        .container { max-width: 1200px; margin: 0 auto; padding: 2rem; }
        .page-header {
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .page-header h1 {
            font-family: 'Space Mono', monospace;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        .page-header p { color: var(--text2); font-size: 0.95rem; }
        .tag {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .tag-stars { background: #ffd16620; color: var(--gold); }
        .tag-contenders { background: #118ab220; color: var(--accent2); }
        .tag-regulars { background: #06d6a020; color: var(--accent); }
        .tag-newcomers { background: #8892a420; color: var(--text2); }

        /* ─── CARDS ─── */
        .grid { display: grid; gap: 1.5rem; }
        .grid-2 { grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); }
        .grid-3 { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
        .grid-4 { grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
        .card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            transition: all 0.2s;
        }
        .card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .card h3 { font-size: 0.85rem; color: var(--text2); font-weight: 500; margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .card .value { font-family: 'Space Mono', monospace; font-size: 2rem; font-weight: 700; color: var(--accent); }
        .card .sub { color: var(--text2); font-size: 0.85rem; margin-top: 0.25rem; }

        /* ─── FORMS ─── */
        .search-box {
            position: relative;
            max-width: 500px;
        }
        .search-box input {
            width: 100%;
            padding: 0.85rem 1.2rem;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 1rem;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: var(--accent); }
        .search-box input::placeholder { color: var(--text2); }
        .dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            margin-top: 4px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 50;
            display: none;
        }
        .dropdown.show { display: block; }
        .dropdown-item {
            padding: 0.65rem 1.2rem;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.15s;
        }
        .dropdown-item:hover { background: var(--bg3); color: var(--accent); }
        select {
            padding: 0.65rem 1rem;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 0.9rem;
            font-family: 'DM Sans', sans-serif;
            outline: none;
            cursor: pointer;
        }
        select:focus { border-color: var(--accent); }
        .btn {
            padding: 0.75rem 1.5rem;
            background: var(--accent);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover { opacity: 0.85; transform: translateY(-1px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .form-row { display: flex; gap: 1rem; align-items: end; flex-wrap: wrap; margin-bottom: 2rem; }

        /* ─── TABLE ─── */
        table { width: 100%; border-collapse: collapse; }
        th, td {
            padding: 0.75rem 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
        }
        th { color: var(--text2); font-weight: 500; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.5px; }
        tr:hover td { background: var(--bg3); }

        /* ─── RESULT PANELS ─── */
        .result-panel {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-top: 1.5rem;
            display: none;
        }
        .result-panel.show { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border);
        }
        .result-header h2 {
            font-family: 'Space Mono', monospace;
            font-size: 1.1rem;
        }
        .model-card {
            background: var(--bg3);
            border-radius: 10px;
            padding: 1.25rem;
            text-align: center;
        }
        .model-card .model-name { font-size: 0.8rem; color: var(--text2); margin-bottom: 0.5rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .model-card .prob {
            font-family: 'Space Mono', monospace;
            font-size: 2.25rem;
            font-weight: 700;
        }
        .prob.win { color: var(--accent); }
        .prob.loss { color: var(--warn); }
        .model-card .label {
            font-size: 0.85rem;
            font-weight: 700;
            margin-top: 0.25rem;
            padding: 0.2rem 0.75rem;
            border-radius: 6px;
            display: inline-block;
        }
        .label-win { background: #06d6a020; color: var(--accent); }
        .label-loss { background: #ef476f20; color: var(--warn); }
        .player-info { display: flex; gap: 2rem; flex-wrap: wrap; margin-bottom: 1rem; }
        .player-info .info-item span:first-child { color: var(--text2); font-size: 0.8rem; display: block; }
        .player-info .info-item span:last-child { font-weight: 700; font-size: 1.1rem; }

        /* ─── RECOMMENDATION ─── */
        .rec-item {
            background: var(--bg3);
            border-radius: 10px;
            padding: 1rem 1.25rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .rec-item .rec-name { font-weight: 500; }
        .rec-item .rec-meta { color: var(--text2); font-size: 0.85rem; }
        .rec-item .rec-price {
            font-family: 'Space Mono', monospace;
            font-weight: 700;
            color: var(--accent);
        }
        .pro-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--bg3);
            border-radius: 8px;
            padding: 0.5rem 1rem;
            margin: 0.25rem;
        }
        .pro-badge .sim {
            font-family: 'Space Mono', monospace;
            color: var(--accent);
            font-size: 0.85rem;
        }

        /* ─── TALENT ─── */
        .talent-badge {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 700;
        }
        .talent-yes { background: #06d6a020; color: var(--accent); }
        .talent-no { background: var(--bg3); color: var(--text2); }

        /* ─── LOADING ─── */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-left: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .spinner.show { display: inline-block; }

        /* ─── RESPONSIVE ─── */
        @media (max-width: 768px) {
            nav { padding: 0 1rem; }
            .nav-links { overflow-x: auto; }
            .container { padding: 1rem; }
            .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">PADEL<span>analytics</span></a>
        <div class="nav-links">
            <a href="/" class="{{ 'active' if request.path == '/' else '' }}">Dashboard</a>
            <a href="/predict" class="{{ 'active' if request.path == '/predict' else '' }}">Win Prediction</a>
            <a href="/points" class="{{ 'active' if request.path == '/points' else '' }}">Points Forecast</a>
            <a href="/segments" class="{{ 'active' if request.path == '/segments' else '' }}">Segments</a>
            <a href="/recommend" class="{{ 'active' if request.path == '/recommend' else '' }}">Equipment</a>
            <a href="/talent" class="{{ 'active' if request.path == '/talent' else '' }}">Talent Scout</a>
            <a href="/forecast" class="{{ 'active' if request.path == '/forecast' else '' }}">Forecast</a>
        </div>
    </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
    // Global player search autocomplete
    function initSearch(inputId, dropdownId, callback) {
        const input = document.getElementById(inputId);
        const dropdown = document.getElementById(dropdownId);
        if (!input || !dropdown) return;

        let timeout;
        input.addEventListener('input', () => {
            clearTimeout(timeout);
            const q = input.value.trim();
            if (q.length < 2) { dropdown.classList.remove('show'); return; }
            timeout = setTimeout(() => {
                fetch(`/api/search-players?q=${encodeURIComponent(q)}`)
                    .then(r => r.json())
                    .then(players => {
                        dropdown.innerHTML = players.map(p =>
                            `<div class="dropdown-item" data-player="${p}">${p}</div>`
                        ).join('');
                        dropdown.classList.toggle('show', players.length > 0);
                        dropdown.querySelectorAll('.dropdown-item').forEach(item => {
                            item.addEventListener('click', () => {
                                input.value = item.dataset.player;
                                dropdown.classList.remove('show');
                                if (callback) callback(item.dataset.player);
                            });
                        });
                    });
            }, 200);
        });
        document.addEventListener('click', (e) => {
            if (!input.contains(e.target) && !dropdown.contains(e.target))
                dropdown.classList.remove('show');
        });
    }
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
