{% extends "base.html" %}
{% block title %}Win Prediction — Padel Analytics{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Win Prediction</h1>
    <p>Classification models predict match outcomes (Random Forest · Gradient Boosting · XGBoost)</p>
</div>

<div style="display:flex; gap:0.25rem; margin-bottom:2rem; border-bottom:1px solid var(--border);">
    <button class="tab-btn active" onclick="switchTab('player')" id="tab-player" style="padding:0.75rem 1.5rem; background:none; border:none; border-bottom:2px solid var(--accent); color:var(--accent); font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer;">Player Prediction</button>
    <button class="tab-btn" onclick="switchTab('team')" id="tab-team" style="padding:0.75rem 1.5rem; background:none; border:none; border-bottom:2px solid transparent; color:var(--text2); font-family:'DM Sans',sans-serif; font-size:0.95rem; font-weight:700; cursor:pointer;">Team vs Team</button>
</div>

<!-- ═══ PLAYER TAB ═══ -->
<div id="panel-player">
    <div class="form-row">
        <div class="search-box" style="flex:1">
            <input type="text" id="player-input" placeholder="Search for a player..." autocomplete="off">
            <div class="dropdown" id="player-dropdown"></div>
        </div>
        <select id="round-select">
            <option value="Round of 64">Round of 64</option>
            <option value="Round of 32" selected>Round of 32</option>
            <option value="Round of 16">Round of 16</option>
            <option value="Quarterfinals">Quarterfinals</option>
            <option value="Semifinals">Semifinals</option>
            <option value="Final">Final</option>
        </select>
        <button class="btn" id="predict-btn" onclick="predictPlayer()" disabled>Predict</button>
        <div class="spinner" id="spinner1"></div>
    </div>
    <div class="result-panel" id="result-player">
        <div class="result-header"><h2 id="rp-name"></h2><span class="tag" id="rp-segment"></span></div>
        <div class="player-info" id="rp-info"></div>
        <div class="grid grid-3" id="rp-models"></div>
    </div>
</div>

<!-- ═══ TEAM VS TEAM TAB ═══ -->
<div id="panel-team" style="display:none;">
    <div style="display:grid; grid-template-columns:1fr auto 1fr; gap:1.5rem; align-items:start; margin-bottom:1.5rem;">
        <div class="card" style="border-color:var(--accent)">
            <h3 style="color:var(--accent); margin-bottom:1rem;">Team A</h3>
            <div class="search-box" style="max-width:100%; margin-bottom:0.75rem;">
                <input type="text" id="ta-p1" placeholder="Player 1..." autocomplete="off">
                <div class="dropdown" id="ta-p1-dd"></div>
            </div>
            <div class="search-box" style="max-width:100%;">
                <input type="text" id="ta-p2" placeholder="Player 2..." autocomplete="off">
                <div class="dropdown" id="ta-p2-dd"></div>
            </div>
        </div>
        <div style="display:flex; align-items:center; padding-top:3rem;">
            <span style="font-family:'Space Mono',monospace; font-size:1.75rem; font-weight:700; color:var(--text2);">VS</span>
        </div>
        <div class="card" style="border-color:var(--warn)">
            <h3 style="color:var(--warn); margin-bottom:1rem;">Team B</h3>
            <div class="search-box" style="max-width:100%; margin-bottom:0.75rem;">
                <input type="text" id="tb-p1" placeholder="Player 1..." autocomplete="off">
                <div class="dropdown" id="tb-p1-dd"></div>
            </div>
            <div class="search-box" style="max-width:100%;">
                <input type="text" id="tb-p2" placeholder="Player 2..." autocomplete="off">
                <div class="dropdown" id="tb-p2-dd"></div>
            </div>
        </div>
    </div>
    <div style="display:flex; gap:1rem; align-items:center; margin-bottom:2rem;">
        <select id="round-select-team">
            <option value="Round of 64">Round of 64</option>
            <option value="Round of 32" selected>Round of 32</option>
            <option value="Round of 16">Round of 16</option>
            <option value="Quarterfinals">Quarterfinals</option>
            <option value="Semifinals">Semifinals</option>
            <option value="Final">Final</option>
        </select>
        <button class="btn" id="team-btn" onclick="predictTeam()">Predict Match</button>
        <div class="spinner" id="spinner2"></div>
    </div>
    <div class="result-panel" id="result-team">
        <div id="team-header" style="display:grid; grid-template-columns:1fr auto 1fr; gap:1.5rem; margin-bottom:1.5rem; text-align:center;"></div>
        <div id="team-bars" style="margin-bottom:1.5rem;"></div>
        <div class="grid grid-3" id="team-models" style="margin-bottom:1.5rem;"></div>
        <div id="h2h-section"></div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function switchTab(tab) {
    document.getElementById('panel-player').style.display = tab === 'player' ? 'block' : 'none';
    document.getElementById('panel-team').style.display = tab === 'team' ? 'block' : 'none';
    document.getElementById('tab-player').style.borderBottomColor = tab === 'player' ? 'var(--accent)' : 'transparent';
    document.getElementById('tab-player').style.color = tab === 'player' ? 'var(--accent)' : 'var(--text2)';
    document.getElementById('tab-team').style.borderBottomColor = tab === 'team' ? 'var(--accent)' : 'transparent';
    document.getElementById('tab-team').style.color = tab === 'team' ? 'var(--accent)' : 'var(--text2)';
}

// Player prediction
let selectedPlayer = null;
initSearch('player-input', 'player-dropdown', (name) => { selectedPlayer = name; document.getElementById('predict-btn').disabled = false; });

function predictPlayer() {
    if (!selectedPlayer) return;
    const btn = document.getElementById('predict-btn'); const sp = document.getElementById('spinner1');
    btn.disabled = true; sp.classList.add('show');
    fetch('/api/predict', { method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ player_name: selectedPlayer, round: document.getElementById('round-select').value })
    }).then(r => r.json()).then(data => {
        if (data.error) { alert(data.error); return; }
        document.getElementById('rp-name').textContent = data.player;
        const seg = document.getElementById('rp-segment'); seg.textContent = data.segment; seg.className = 'tag tag-' + data.segment.toLowerCase();
        document.getElementById('rp-info').innerHTML = `
            <div class="info-item"><span>Country</span><span>${data.country}</span></div>
            <div class="info-item"><span>Rank</span><span>#${data.position}</span></div>
            <div class="info-item"><span>Points</span><span>${data.points.toLocaleString()}</span></div>
            <div class="info-item"><span>Win Rate</span><span>${data.win_rate}%</span></div>
            <div class="info-item"><span>Round</span><span>${data.round}</span></div>`;
        let h = '';
        for (const [m, r] of Object.entries(data.models)) {
            const w = r.prediction === 'WIN';
            h += `<div class="model-card"><div class="model-name">${m}</div>
                <div class="prob ${w?'win':'loss'}">${(r.probability*100).toFixed(1)}%</div>
                <div class="label ${w?'label-win':'label-loss'}">${r.prediction}</div>
                <div style="color:var(--text2);font-size:0.8rem;margin-top:0.5rem">Confidence: ${r.confidence}%</div></div>`;
        }
        document.getElementById('rp-models').innerHTML = h;
        document.getElementById('result-player').classList.add('show');
    }).finally(() => { btn.disabled = false; sp.classList.remove('show'); });
}

// Team vs Team
let tp = {'ta-p1':null,'ta-p2':null,'tb-p1':null,'tb-p2':null};
['ta-p1','ta-p2','tb-p1','tb-p2'].forEach(id => { initSearch(id, id+'-dd', name => { tp[id] = name; }); });

function predictTeam() {
    const ta = [tp['ta-p1'], tp['ta-p2']], tb = [tp['tb-p1'], tp['tb-p2']];
    if (ta.includes(null) || tb.includes(null)) { alert('Please select all 4 players'); return; }
    const btn = document.getElementById('team-btn'); const sp = document.getElementById('spinner2');
    btn.disabled = true; sp.classList.add('show');

    fetch('/api/predict-team', { method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ team_a: ta, team_b: tb, round: document.getElementById('round-select-team').value })
    }).then(r => r.json()).then(data => {
        if (data.error) { alert(data.error); return; }
        const a = data.team_a.players, b = data.team_b.players;

        document.getElementById('team-header').innerHTML = `
            <div><div style="font-size:0.8rem;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem">Team A</div>
                <div style="font-weight:700;font-size:1.1rem">${a[0].name}</div><div style="color:var(--text2);font-size:0.85rem">#${a[0].position} · ${a[0].points.toLocaleString()} pts · ${a[0].win_rate}% WR</div>
                <div style="font-weight:700;font-size:1.1rem;margin-top:0.5rem">${a[1].name}</div><div style="color:var(--text2);font-size:0.85rem">#${a[1].position} · ${a[1].points.toLocaleString()} pts · ${a[1].win_rate}% WR</div></div>
            <div style="font-family:'Space Mono',monospace;font-size:1.5rem;color:var(--text2);align-self:center">VS</div>
            <div><div style="font-size:0.8rem;color:var(--warn);text-transform:uppercase;letter-spacing:1px;margin-bottom:0.5rem">Team B</div>
                <div style="font-weight:700;font-size:1.1rem">${b[0].name}</div><div style="color:var(--text2);font-size:0.85rem">#${b[0].position} · ${b[0].points.toLocaleString()} pts · ${b[0].win_rate}% WR</div>
                <div style="font-weight:700;font-size:1.1rem;margin-top:0.5rem">${b[1].name}</div><div style="color:var(--text2);font-size:0.85rem">#${b[1].position} · ${b[1].points.toLocaleString()} pts · ${b[1].win_rate}% WR</div></div>`;

        let bars = '';
        for (const [m, r] of Object.entries(data.models)) {
            const pA = (r.team_a_prob*100).toFixed(1), pB = (r.team_b_prob*100).toFixed(1);
            bars += `<div style="margin-bottom:1rem;">
                <div style="display:flex;justify-content:space-between;font-size:0.8rem;color:var(--text2);margin-bottom:0.35rem">
                    <span>${m}</span><span style="color:${r.winner==='Team A'?'var(--accent)':'var(--warn)'};font-weight:700">${r.winner} wins (+${r.margin}%)</span></div>
                <div style="display:flex;height:36px;border-radius:8px;overflow:hidden;gap:2px">
                    <div style="width:${pA}%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:0.85rem;font-weight:700;color:var(--bg)">A ${pA}%</div>
                    <div style="width:${pB}%;background:var(--warn);display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:0.85rem;font-weight:700;color:var(--bg)">B ${pB}%</div>
                </div></div>`;
        }
        document.getElementById('team-bars').innerHTML = bars;

        let mh = '';
        for (const [m, r] of Object.entries(data.models)) {
            const isA = r.winner === 'Team A';
            mh += `<div class="model-card"><div class="model-name">${m}</div>
                <div class="prob" style="color:${isA?'var(--accent)':'var(--warn)'};font-size:1.5rem">${isA?'Team A':'Team B'}</div>
                <div style="font-size:0.85rem;color:var(--text2);margin-top:0.25rem">Margin: ${r.margin}%</div></div>`;
        }
        document.getElementById('team-models').innerHTML = mh;

        let h2h = '';
        if (data.h2h_count > 0) {
            h2h = `<div style="border-top:1px solid var(--border);padding-top:1rem"><h3 style="margin-bottom:0.75rem;color:var(--gold)">Head-to-Head History (${data.h2h_count} matches)</h3>`;
            data.head_to_head.forEach(m => {
                h2h += `<div style="display:flex;justify-content:space-between;padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.9rem">
                    <span>${m.tournament} — ${m.round}</span><span style="font-family:'Space Mono',monospace">${m.score_a} vs ${m.score_b}</span>
                    <span style="color:var(--accent);font-weight:700">${m.winner}</span></div>`;
            }); h2h += '</div>';
        } else { h2h = '<div style="border-top:1px solid var(--border);padding-top:1rem;color:var(--text2);font-size:0.9rem">No head-to-head history found.</div>'; }
        document.getElementById('h2h-section').innerHTML = h2h;
        document.getElementById('result-team').classList.add('show');
    }).finally(() => { btn.disabled = false; sp.classList.remove('show'); });
}
</script>
{% endblock %}
